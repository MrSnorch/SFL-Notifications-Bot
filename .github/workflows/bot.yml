name: SFL Bot

on:
  # Страховочный cron — запустит если self-restart по какой-то причине не сработал
  schedule:
    - cron: '30 */6 * * *'   # Смещение 30 мин от сканера
  # Self-restart и ручной запуск
  workflow_dispatch:

concurrency:
  group: sfl-bot
  cancel-in-progress: true  # Новый запуск отменяет предыдущий

permissions:
  contents: read
  actions: write   # Нужно для self-restart через API

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # 5ч 55м

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Telegram bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
        run: |
          python sfl_bot.py --duration 20700
          # 20700с = 5ч 45м — оставляем ~10 мин на restart step

      - name: Self-restart — trigger next run
        if: always()   # Запускаем даже если предыдущий шаг упал
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bot.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}" \
            && echo "✅ Next run triggered" \
            || echo "⚠️ Failed to trigger next run (cron will catch it)"
