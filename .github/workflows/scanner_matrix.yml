name: SFL Scanner Matrix

# Каждый пользователь получает свой runner (= свой IP) на ~5ч45м.
# В конце restart пересобирает матрикс — подхватывает новых/удалённых юзеров.
# Cron — только страховка если self-restart не сработал.

on:
  schedule:
    - cron: '0 */6 * * *'   # Страховочный cron раз в 6ч
  workflow_dispatch:

concurrency:
  group: sfl-scanner-matrix
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  # ── Шаг 1: получаем актуальный список пользователей ───────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.get_users.outputs.matrix }}
      has_users: ${{ steps.get_users.outputs.has_users }}
    steps:
      - name: Fetch active telegram_ids from Supabase
        id: get_users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          USERS=$(curl -sf \
            "${SUPABASE_URL}/rest/v1/users?active=eq.true&select=telegram_id" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            | python3 -c "import sys,json; ids=[str(u['telegram_id']) for u in json.load(sys.stdin)]; print(json.dumps(ids))")

          COUNT=$(echo "$USERS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "matrix={\"telegram_id\":${USERS}}" >> $GITHUB_OUTPUT
          echo "has_users=$([ $COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "Активных пользователей: $COUNT"

  # ── Шаг 2: каждый юзер крутит свой цикл ~5ч45м на отдельном runner ────────
  scan:
    needs: prepare
    if: needs.prepare.outputs.has_users == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    timeout-minutes: 355   # 5ч 55м — как в оригинальном scanner.yml

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run loop for user ${{ matrix.telegram_id }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
        run: |
          python sfl_scanner.py \
            --user ${{ matrix.telegram_id }} \
            --duration 20700 \
            --interval 15

  # ── Шаг 3: пересобираем матрикс (подхватит новых юзеров) ──────────────────
  restart:
    needs: scan
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger next matrix run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/scanner_matrix.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}" \
            && echo "✅ Next run triggered" \
            || echo "⚠️ Failed (cron will catch it)"
